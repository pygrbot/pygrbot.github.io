<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pygrbot</title>
    <link rel="icon" type="image/png" href="ico.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #0D1117;
            color: #FFFFFF;
            line-height: 1.6;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #00D4AA;
        }

        .subtitle {
            color: #8B949E;
            margin-bottom: 20px;
        }

        .badges {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .badges img {
            height: 20px;
        }

        .github-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #161B22;
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 6px;
            border: 1px solid #30363D;
            transition: all 0.2s;
            font-weight: 500;
        }

        .github-btn:hover {
            border-color: #00D4AA;
            background: #1a2329;
            transform: translateY(-2px);
        }

        .github-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="ico.png" alt="Profile" class="profile-img">
        <h1>pygrbot</h1>
        <p class="subtitle">GitHub Bot</p>
        <div class="badges">
            <img src="https://img.shields.io/github/followers/pygrbot?style=flat&logo=github&color=00D4AA&labelColor=0D1117" alt="GitHub followers">
            <img src="https://img.shields.io/github/stars/pygrbot?style=flat&logo=github&color=00D4AA&labelColor=0D1117" alt="GitHub stars">
            <img src="https://komarev.com/ghpvc/?username=pygrbot&color=00D4AA&labelColor=0D1117&style=flat" alt="Profile views">
        </div>
        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
            <a href="https://github.com/pygrbot" class="github-btn" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                GitHub
            </a>
        </div>
    </div>
</body>
</html>
